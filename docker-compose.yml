version: '3.9'
services:
  api:
    build: .
    container_name: odoo-knowledge-copilot-api
    env_file:
      - .env.example
    ports:
      - "8000:8000"
    depends_on:
      - qdrant

  qdrant:
    image: qdrant/qdrant:latest
    container_name: odoo-knowledge-copilot-qdrant
    ports:
      - "6333:6333"
