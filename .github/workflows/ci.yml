name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff mypy bandit pip-audit

      - name: Lint
        run: |
          ruff check app tests scripts
          PYTHONPATH=. mypy --explicit-package-bases app --ignore-missing-imports

      - name: Unit and integration tests
        run: pytest --cov=app --cov-report=term-missing --cov-report=xml

      - name: Bandit scan
        run: |
          mkdir -p reports
          bandit -r app -f json -o reports/security_scan_bandit.json

      - name: Pip audit
        run: pip-audit

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker build
        run: docker build -t odoo-knowledge-copilot:ci .

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
