openapi: 3.1.0
info:
  title: Odoo Knowledge Copilot API
  version: 1.0.0
  description: API REST para consultas RAG sobre documentación funcional y técnica de Odoo.

servers:
  - url: https://api.odoo-knowledge-copilot.local

paths:
  /v1/health:
    get:
      summary: Health check del sistema
      responses:
        "200":
          description: Servicio operativo

  /v1/query:
    post:
      summary: Consulta principal al sistema RAG
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QueryRequest"
            example:
              query: "¿Cómo se configura la aprobación de órdenes de compra en Odoo 18?"
              session_id: "9c6e5b3f-f7c9-4f45-b8cd-0fe95da45f80"
              filters:
                doc_type: "manual"
                module: "purchase"
                version: "18"
              stream: false
      responses:
        "200":
          description: Respuesta exitosa
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueryResponse"
              example:
                answer: "En Odoo 18 la aprobación de órdenes de compra se configura desde el módulo Purchase..."
                sources:
                  - doc_id: "DOC-014"
                    doc_name: "manual_purchase_odoo18.pdf"
                    page: 12
                    score: 0.86
                    chunk_id: "DOC-014-p12-c03"
                tokens_used: 1284
                latency_ms: 1480
                trace_id: "ce58b52d-60e8-4581-b5f7-0f51ae0ea1cb"
        "400":
          description: Request inválido
        "401":
          description: API key inválida o ausente
        "422":
          description: Error de validación
        "429":
          description: Rate limit excedido
        "503":
          description: Proveedor LLM no disponible

  /v1/documents:
    post:
      summary: Ingesta documental
      security:
        - ApiKeyAuth: []
      responses:
        "202":
          description: Documento aceptado para procesamiento

  /v1/feedback:
    post:
      summary: Registro de feedback del usuario
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [trace_id, score]
              properties:
                trace_id:
                  type: string
                  format: uuid
                score:
                  type: integer
                  minimum: 1
                  maximum: 5
                comment:
                  type: string
      responses:
        "201":
          description: Feedback registrado

  /v1/traces/{trace_id}:
    get:
      summary: Consultar trazabilidad de una solicitud
      security:
        - ApiKeyAuth: []
      parameters:
        - in: path
          name: trace_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Trazabilidad encontrada
        "404":
          description: Trace no encontrado

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key

  schemas:
    QueryRequest:
      type: object
      required:
        - query
      properties:
        query:
          type: string
          maxLength: 8000
        session_id:
          type: string
          format: uuid
        filters:
          type: object
          properties:
            doc_type:
              type: string
              enum: [manual, procedimiento, ticket, configuracion, tecnico]
            module:
              type: string
            version:
              type: string
        stream:
          type: boolean
          default: false

    SourceItem:
      type: object
      properties:
        doc_id:
          type: string
        doc_name:
          type: string
        page:
          type: integer
        score:
          type: number
        chunk_id:
          type: string

    QueryResponse:
      type: object
      properties:
        answer:
          type: string
        sources:
          type: array
          items:
            $ref: "#/components/schemas/SourceItem"
        tokens_used:
          type: integer
        latency_ms:
          type: integer
        trace_id:
          type: string
          format: uuid